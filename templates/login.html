{% extends "base.html" %}
{% block content %}
<div style="max-width:360px;margin:8vh auto;background:#fff;padding:32px;border-radius:14px;
     box-shadow:0 2px 10px rgba(14,33,62,.1)">
  <h1 style="color:var(--navy);font-size:26px;margin-bottom:6px">Přihlášení</h1>
  <p class="muted" style="font-size:13px;margin-bottom:20px">Kokpit zakázek Commarec</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="password" name="heslo" placeholder="Heslo" autofocus
           style="width:100%;padding:11px 13px;border:1px solid var(--n7);border-radius:8px;
                  font-family:inherit;font-size:15px;margin-bottom:14px">
    <button class="btn" style="width:100%" type="submit">Vstoupit</button>
  </form>
</div>
{% endblock %}
